<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="forms.css">
    <title>forms in html</title>
    <style>
        /* Naruto Anime Theme - Ninja Vibes */
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body {
  background-image: url('https://wallpaperaccess.com/full/1839631.jpg'); /* Naruto background */
  background-size: cover;
  background-attachment: fixed;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  padding: 30px;
  color: #fff;
}

h1 {
  text-align: center;
  font-family: 'Press Start 2P', cursive;
  font-size: 2.2rem;
  color: #ff9900;
  text-shadow: 2px 2px #000;
  margin-bottom: 40px;
}

form {
  background-color: rgba(0, 0, 0, 0.7);
  max-width: 600px;
  margin: auto;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 0 20px #ff6600;
  border: 2px solid #ff9900;
}

form div {
  margin-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 8px;
  font-weight: bold;
  color: #ffcc00;
}

input[type="text"],
input[type="email"],
input[type="password"],
input[type="tel"],
input[type="date"],
select {
  width: 100%;
  padding: 12px;
  border: 2px solid #ffa500;
  border-radius: 8px;
  background-color: #222;
  color: #fff;
  font-size: 1em;
  transition: 0.3s ease;
}

input[type="text"]:focus,
input[type="email"]:focus,
input[type="password"]:focus,
input[type="tel"]:focus,
input[type="date"]:focus,
select:focus {
  border-color: #ff4500;
  box-shadow: 0 0 8px #ff4500;
  outline: none;
}

input[type="radio"] {
  transform: scale(1.2);
  margin-right: 8px;
}

p {
  font-weight: bold;
  color: #ffa500;
}

button {
  background-color: #ff6600;
  color: #fff;
  padding: 12px 20px;
  font-size: 1em;
  font-weight: bold;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  width: 100%;
  transition: background-color 0.3s ease, transform 0.2s;
  position: relative;
}

button::after {
  content: "🌀";
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
}

button:hover {
  background-color: #cc3300;
  transform: scale(1.05);
}

select {
  background-color: #333;
}

/* Fun Shadow Clone Border Animation */
form:hover {
  box-shadow: 0 0 30px #ff9900, 0 0 50px #ff3300 inset;
  transition: 0.5s ease-in-out;
}


    </style>
</head>
<h1>forms in html</h1>
<form action="/submit.php">
    <div>
        <label for="name">name</label>
        <input type="text" id="name" placeholder="enter your name">
    </div>
    <div>
        <label for="phone">phone</label>
        <input type="phone" placeholder="enter your phone number" id="phone">
    </div>
    <div>
        <label for="email">email</label>
        <input type="email" placeholder="enter your email id" id="email">
    </div>
    <div>
        <label for="password">password</label>
        <input type="password" placeholder="enter your password" id="password">
</div>
<div>
    <label for="dob">date of birth</label>
    <input type="date" required placeholder="enter your date" id="dob">
</div>
<div>
    <label for="gender">gender</label>
    <select id="gender" required>
        <option value="" disabled selected> select gender

        </option>
        <option value="male">male</option>
        <option value="female">female</option>
        <option value="others">others</option>
    </select>

</div>
<div>
    <p>select subscription plan</p>
    <input type="radio" name="subscripton" id="basic" value="basic">
    <label for="basic">basic</label>
    <input type="radio" name="subscription" id="premium" value="premium">
    <label for="premium">premium</label>
    <input type="radio" name="subscription" id="vip">
    <label for="vip">vip</label>
</div>
<div>
    <button type="submit">submit</button>
</div>

</form>
<body>
    
</body>
</html>
